<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page not found</title>
    <style>
      body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:#0b1220;color:#e5e7eb}
      .wrap{max-width:720px;margin:0 auto;padding:48px 16px;text-align:center}
      .card{background:#111a2e;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:32px}
      h1{font-size:28px;margin:0 0 12px}
      p{margin:0 0 22px;color:#cbd5e1}
      .btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
      a,button{appearance:none;border:1px solid rgba(255,255,255,.16);background:transparent;color:#e5e7eb;padding:10px 16px;border-radius:12px;text-decoration:none;cursor:pointer;font-weight:600}
      a.primary{background:#3b82f6;border-color:#3b82f6}
      a:hover,button:hover{transform:translateY(-1px)}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Page not found.</h1>
        <p>Please check the link or go back home.</p>
        <div class="btns">
          <a class="primary" href="/">Home</a>
          <button type="button" onclick="window.location.reload()">Retry</button>
        </div>
      </div>
    </div>
  </body>
</html>
